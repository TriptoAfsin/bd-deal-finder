    kitchen: 40000             # microwave, oven, cooker
    cooling: 80000             # AC, fan, air purifier
    laundry: 60000             # washing machine, dryer
    entertainment: 100000      # TV, soundbar, theater
    power: 50000               # IPS, UPS, generator, stabilizer
    water: 25000               # purifier, geyser

